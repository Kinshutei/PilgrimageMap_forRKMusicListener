<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聖地巡礼マップ - RK Music</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; }
    #map { height: 100vh; width: 100%; }

  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    const map = L.map('map').setView([35.6812, 139.7671], 10);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>'
    }).addTo(map);

    const DEFAULT_ICON = 'icons/RKM_MapIcon.png';
    const ICON_SIZE = [36, 36];
    const ICON_ANCHOR = [18, 36];
    const POPUP_ANCHOR = [0, -36];

    // シンガー別アイコンが揃い次第、icons/${singerName}_MapIcon.png を参照する
    const SINGER_ICONS = [
      'LEWNE',
    ];

    function makeIcon(singerName) {
      const path = (singerName && SINGER_ICONS.includes(singerName))
        ? `icons/${singerName}_MapIcon.png`
        : DEFAULT_ICON;
      return L.icon({
        iconUrl: path,
        iconSize: ICON_SIZE,
        iconAnchor: ICON_ANCHOR,
        popupAnchor: POPUP_ANCHOR,
      });
    }

    Papa.parse('locations.csv', {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        results.data.forEach(row => {
          const lat = parseFloat(row.lat);
          const lng = parseFloat(row.lng);
          if (isNaN(lat) || isNaN(lng)) return;

          // singer列が複数名の場合は最初の1名のアイコンを使用
          const primarySinger = row.singer ? row.singer.split(',')[0].trim() : '';
          const icon = makeIcon(primarySinger);
          const marker = L.marker([lat, lng], { icon }).addTo(map);


          const gmapsUrl = `https://maps.google.com/?q=${encodeURIComponent(row.name)}&ll=${lat},${lng}`;
          let popup = `<b>${row.name}</b><br>${row.category}`;
          if (row.singer) popup += ` | ${row.singer}`;
          if (row.description) popup += `<br>${row.description}`;
          popup += `<br>`;
          if (row.source_url) popup += `<a href="${row.source_url}" target="_blank">出典</a> ／ `;
          popup += `<a href="${gmapsUrl}" target="_blank">Googleマップで開く</a>`;

          marker.bindPopup(popup);
        });
      }
    });
  </script>
</body>
</html>
